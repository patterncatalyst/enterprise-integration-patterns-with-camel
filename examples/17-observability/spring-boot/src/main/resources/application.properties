spring.application.name=eip-observability

# Kafka broker
kafka.brokers=localhost:9092

# PostgreSQL datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/eipdb
spring.datasource.username=eipuser
spring.datasource.password=eippass

# Camel message history
camel.main.message-history=true

# Actuator health endpoint
management.endpoints.web.exposure.include=health,info

# Logging
logging.level.org.apache.camel=INFO
logging.level.com.example.eip=DEBUG

# Server port — avoid conflict with Pulsar admin on 8080
server.port=8082
