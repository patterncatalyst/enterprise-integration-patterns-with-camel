# Control Bus — REST endpoints to query and manage route lifecycle
# (status, stop, start) via the Camel ControlBus component.
- rest:
    path: /control
    get:
      - path: /status/{routeId}
        to: "direct:route-status"
    post:
      - path: /stop/{routeId}
        to: "direct:route-stop"
      - path: /start/{routeId}
        to: "direct:route-start"

- route:
    id: control-bus-status
    from:
      uri: "direct:route-status"
    steps:
      - toD:
          uri: "controlbus:route?routeId=${header.routeId}&action=status"
      - log: "Route ${header.routeId} status: ${body}"

- route:
    id: control-bus-stop
    from:
      uri: "direct:route-stop"
    steps:
      - log: "Stopping route: ${header.routeId}"
      - toD:
          uri: "controlbus:route?routeId=${header.routeId}&action=stop"

- route:
    id: control-bus-start
    from:
      uri: "direct:route-start"
    steps:
      - log: "Starting route: ${header.routeId}"
      - toD:
          uri: "controlbus:route?routeId=${header.routeId}&action=start"
