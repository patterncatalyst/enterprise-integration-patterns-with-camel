services:
  # ── Grafana ──────────────────────────────────────────────────────────────
  grafana:
    image: docker.io/grafana/grafana:latest
    container_name: eip-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
    volumes:
      - ./grafana/datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:Z
      - grafana-data:/var/lib/grafana:Z
    mem_limit: 512m
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/api/health"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 30s
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
      mimir:
        condition: service_healthy
    networks:
      - eip-net

  # ── Loki (logs) ─────────────────────────────────────────────────────────
  loki:
    image: docker.io/grafana/loki:latest
    container_name: eip-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml:Z
      - loki-data:/loki:Z
    command: -config.file=/etc/loki/local-config.yaml
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s
    networks:
      - eip-net

  # ── Tempo (traces) ──────────────────────────────────────────────────────
  tempo:
    image: docker.io/grafana/tempo:latest
    container_name: eip-tempo
    ports:
      - "3200:3200"
    volumes:
      - ./tempo/tempo-config.yaml:/etc/tempo/config.yaml:Z
      - tempo-data:/var/tempo:Z
    command: -config.file=/etc/tempo/config.yaml
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3200/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 20s
    networks:
      - eip-net

  # ── Mimir (metrics) ────────────────────────────────────────────────────
  mimir:
    image: docker.io/grafana/mimir:latest
    container_name: eip-mimir
    ports:
      - "9009:9009"
    volumes:
      - ./mimir/mimir-config.yaml:/etc/mimir/config.yaml:Z
      - mimir-data:/data:Z
    command: -config.file=/etc/mimir/config.yaml
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9009/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 30s
    networks:
      - eip-net

  # ── OpenTelemetry Collector ─────────────────────────────────────────────
  otel-collector:
    image: docker.io/otel/opentelemetry-collector-contrib:latest
    container_name: eip-otel-collector
    ports:
      - "4317:4317"
      - "4318:4318"
    volumes:
      - ./otel/otel-collector-config.yaml:/etc/otelcol-contrib/config.yaml:Z
    command: --config=/etc/otelcol-contrib/config.yaml
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:13133/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    depends_on:
      loki:
        condition: service_healthy
      tempo:
        condition: service_healthy
      mimir:
        condition: service_healthy
    networks:
      - eip-net

volumes:
  grafana-data:
  loki-data:
  tempo-data:
  mimir-data:

networks:
  eip-net:
    name: eip-net
