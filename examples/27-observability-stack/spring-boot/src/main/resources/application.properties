spring.application.name=eip-observability-stack

# Kafka broker
kafka.brokers=localhost:9092

# Server port
server.port=8087

# OpenTelemetry
otel.exporter.otlp.endpoint=http://localhost:4317
otel.exporter.otlp.protocol=grpc
camel.opentelemetry.enabled=true
camel.opentelemetry.exclude-patterns=timer:*

# Camel REST via servlet
camel.servlet.mapping.context-path=/api/*

# Actuator — expose health, metrics, and Prometheus scrape endpoint
management.endpoints.web.exposure.include=health,metrics,prometheus

# Logging
logging.level.org.apache.camel=INFO
logging.level.com.example.eip=DEBUG
