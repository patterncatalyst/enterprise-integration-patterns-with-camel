spring.application.name=eip-testing-management

# Kafka broker
kafka.brokers=localhost:9092

# Detour pattern — toggle enrichment on/off
feature.enrichment.enabled=true

# Smart Proxy pattern — mock | production
payment.gateway.mode=mock

# Circuit breaker settings
camel.resilience4j.sliding-window-size=10
camel.resilience4j.failure-rate-threshold=50

# Actuator health endpoint
management.endpoints.web.exposure.include=health,info

# Logging
logging.level.org.apache.camel=INFO
logging.level.com.example.eip=DEBUG

# Server port — avoid conflict with Pulsar admin on 8080
server.port=8082
