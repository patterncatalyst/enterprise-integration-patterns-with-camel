quarkus.application.name=eip-testing-management

kafka.brokers=localhost:9092

# Detour pattern — toggle enrichment on/off
feature.enrichment.enabled=true

# Smart Proxy pattern — mock | production
payment.gateway.mode=mock

# Circuit breaker settings
camel.resilience4j.sliding-window-size=10
camel.resilience4j.failure-rate-threshold=50

quarkus.log.category."org.apache.camel".level=INFO
quarkus.log.category."com.example.eip".level=DEBUG

# Avoid port 8080 conflict with Pulsar admin
quarkus.http.port=8082

# Use the Podman stack Kafka, not Quarkus Dev Services
quarkus.kafka.devservices.enabled=false
