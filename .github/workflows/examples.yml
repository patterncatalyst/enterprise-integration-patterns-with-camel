name: Build Examples

on:
  push:
    paths:
      - 'examples/**'
      - '.github/workflows/examples.yml'
  pull_request:
    paths:
      - 'examples/**'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        example:
          - 04-channel-types
          - 05-reliability
          - 06-channel-infra
          - 07-message-types
          - 08-message-metadata
          - 09-routing-fundamentals
          - 10-composed-routing
          - 11-advanced-routing
          - 12-transformation
          - 13-aggregator
          - 14-consumer-patterns
          - 15-endpoints
          - 16-endpoint-management
          - 17-observability
          - 18-testing-management
          - loan-broker
          - bond-trading
      fail-fast: false

    name: Build ${{ matrix.example }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build ${{ matrix.example }}
        run: mvn -B package -DskipTests
        working-directory: examples/${{ matrix.example }}
